<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Visual Novel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;background:#f7f3ef;color:#3a3632;height:100vh;width:100vw;overflow:hidden}
#app{width:100%;height:100vh;position:relative}
#home{width:100%;height:100vh;display:flex;flex-direction:column;background:#f7f3ef;overflow:hidden}
.hh{padding:24px 20px 0;display:flex;align-items:center;gap:12px}
.hht{font-size:22px;font-weight:700;color:#3a3632;letter-spacing:1px}
.hhb{display:flex;gap:8px}
.hhb button{background:#fff;border:1px solid rgba(200,190,180,.35);border-radius:10px;padding:8px 16px;font-size:12px;color:#8b7355;cursor:pointer;font-weight:500}
.hhb button:active{background:#f0ece7}
.hhb button.pr{background:#8b7355;color:#fff;border-color:#8b7355}
.hsl{flex:1;overflow-y:auto;padding:16px 20px 30px;-webkit-overflow-scrolling:touch}
.sc{background:#fff;border:1px solid rgba(200,190,180,.2);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;transition:transform .15s}
.sc:active{transform:scale(.98)}
.sc-t{font-size:15px;font-weight:600;color:#3a3632;margin-bottom:4px}
.sc-d{font-size:12px;color:#a09890;line-height:1.5;margin-bottom:8px}
.sc-m{font-size:10px;color:#ccc5be}
.sc-a{display:flex;gap:6px;margin-top:10px}
.sc-a button{font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid rgba(200,190,180,.3);background:#fff;color:#8b7355;cursor:pointer}
.sc-a button.del{color:#c45c5c;border-color:rgba(196,92,92,.2)}
.hempty{text-align:center;padding:60px 20px;color:#ccc5be;font-size:13px;line-height:2}
#nsf{display:none;background:#fff;border:1px solid rgba(200,190,180,.2);border-radius:14px;padding:18px;margin:0 20px 12px}
.nsf-r{margin-bottom:10px}
.nsf-r .lb{font-size:11px;color:#a09890;margin-bottom:4px;display:block}
.nsf-r input,.nsf-r textarea{width:100%;background:#faf8f5;border:1px solid rgba(200,190,180,.35);border-radius:10px;padding:10px 14px;font-size:13px;color:#3a3632;outline:none}
.nsf-r textarea{height:60px;resize:none;line-height:1.6}
.nsf-b{display:flex;gap:8px;margin-top:4px}
.nsf-b button{padding:8px 18px;border-radius:10px;font-size:12px;cursor:pointer;border:none}
.nsf-b .ok{background:#8b7355;color:#fff}
.nsf-b .cc{background:none;border:1px solid rgba(200,190,180,.35);color:#a09890}
#hapi{display:none;background:#fff;border:1px solid rgba(200,190,180,.2);border-radius:14px;padding:18px;margin:0 20px 12px;max-height:65vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#hapi .lb{font-size:11px;color:#a09890;margin-bottom:4px;display:block}
#hapi .inp{width:100%;background:#faf8f5;border:1px solid rgba(200,190,180,.35);border-radius:10px;padding:10px 14px;font-size:13px;color:#3a3632;outline:none;margin-bottom:10px}
#gv{width:100%;height:100%;position:relative;overflow:hidden;display:none}
#screen{position:relative;width:100%;height:100%;background:#e8e2db}
#bgl{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;transition:opacity .8s}
#chl{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.csp{position:absolute;bottom:80px;min-height:75vh;max-height:100%;max-width:100%;object-fit:contain;transition:all .5s;opacity:0;transform:translateY(20px)}
.csp.show{opacity:1;transform:translateY(0)}
.csp.dim{opacity:0.35;filter:brightness(0.7);transition:all .3s}
.csp[data-p="left"]{left:-5%}
.csp[data-p="center"]{left:50%;transform:translateX(-50%)}
.csp[data-p="center"].show{transform:translateX(-50%) translateY(0)}
.csp[data-p="right"]{right:-5%}
#dlg{position:absolute;bottom:60px;left:12px;right:12px;padding:18px 20px 22px;min-height:120px;background:rgba(255,252,249,.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(200,190,180,.25);border-radius:14px;display:none;cursor:pointer;z-index:3}
#spk{font-size:13px;font-weight:600;color:#8b7355;margin-bottom:5px;letter-spacing:.5px}
#dtx{font-size:14px;color:#3a3632;line-height:1.85}
#dtx.nr{font-style:italic;color:#6b6460}
#cti{position:absolute;bottom:8px;right:16px;color:rgba(139,115,85,.35);font-size:10px;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:.3}50%{opacity:.8}}
#ld{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#8b7355;font-size:13px;background:rgba(255,252,249,.85);backdrop-filter:blur(12px);padding:10px 24px;border-radius:20px;border:1px solid rgba(200,190,180,.25);z-index:6}
#smsg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);color:#b5ada5;font-size:13px;text-align:center;line-height:2.2;pointer-events:none}
#ibar{position:absolute;bottom:0;left:0;width:100%;padding:10px 14px;background:rgba(255,252,249,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(200,190,180,.15);display:flex;gap:8px;align-items:center;z-index:5}
#mi{flex:1;background:rgba(245,240,235,.8);border:1px solid rgba(200,190,180,.3);border-radius:18px;padding:10px 18px;font-size:14px;color:#3a3632;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.5;font-family:inherit}
#mi::placeholder{color:#c5bdb5}
#mi:focus{border-color:#8b7355}
#sbtn{background:#8b7355;border:none;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;cursor:pointer;letter-spacing:.5px}
#sbtn:active{background:#6b5a42}
.gt{position:absolute;top:12px;background:rgba(255,252,249,.72);backdrop-filter:blur(8px);border:1px solid rgba(200,190,180,.25);border-radius:10px;cursor:pointer;z-index:10;font-size:12px;color:#8b7355;font-weight:500;padding:8px 14px;letter-spacing:.5px}
.gt:active{background:rgba(255,252,249,.95)}
#setb{right:12px}
#bkb{left:12px}
#rawb{right:72px;font-size:11px;display:none}
#rawx{position:absolute;top:50px;right:12px;left:12px;max-height:60%;overflow-y:auto;background:rgba(255,252,249,.95);backdrop-filter:blur(16px);border:1px solid rgba(200,190,180,.3);border-radius:10px;padding:12px;font-size:11px;color:#6b6460;line-height:1.6;white-space:pre-wrap;z-index:15;display:none}
#tplo{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:8;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
#tplo.on{display:flex}
#tplc{max-width:400px;width:100%;max-height:85vh;overflow-y:auto;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.15);-webkit-overflow-scrolling:touch}
#tplx{position:absolute;top:12px;right:16px;width:28px;height:28px;background:rgba(0,0,0,.4);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;z-index:9;display:flex;align-items:center;justify-content:center}
#ntf{position:absolute;top:-80px;left:12px;right:12px;background:rgba(255,252,249,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,190,180,.2);border-radius:14px;padding:12px 14px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:top .4s cubic-bezier(.2,.9,.3,1);display:flex;gap:10px;align-items:center;cursor:pointer}
#ntf.show{top:12px}
#ntf .ni{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
#ntf .nt{flex:1;min-width:0}
#ntf .na{font-size:11px;font-weight:600;color:#8b7355}
#ntf .nc{font-size:13px;color:#3a3632;margin-top:2px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
#ntf .nm{font-size:10px;color:#a09890;margin-top:2px}
@keyframes pulse-ring{0%,100%{box-shadow:0 4px 15px rgba(46,204,113,0.4)}50%{box-shadow:0 4px 25px rgba(46,204,113,0.7),0 0 40px rgba(46,204,113,0.2)}}
#mv{display:none;width:100%;height:100vh;flex-direction:column;background:#f7f3ef}
#mv.open{display:flex}
.mh{padding:14px 20px 0;display:flex;justify-content:space-between;align-items:center}
.mht{font-size:17px;font-weight:600;color:#3a3632}
.mhb{background:none;border:none;font-size:13px;color:#8b7355;cursor:pointer;padding:6px 0}
.mtabs{display:flex;padding:10px 16px 0;gap:0;border-bottom:1px solid rgba(200,190,180,.2);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.mtabs::-webkit-scrollbar{display:none}
.mt{padding:10px 14px;text-align:center;font-size:12px;color:#a09890;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;flex-shrink:0}
.mt.on{color:#8b7355;border-bottom-color:#8b7355;font-weight:600}
.mp{flex:1;overflow-y:auto;padding:16px 20px 80px;-webkit-overflow-scrolling:touch}
.mpg{display:none}.mpg.on{display:block}
.sec{margin-bottom:22px}
.sech{font-size:13px;font-weight:600;color:#6b6460;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(200,190,180,.15);letter-spacing:.5px}
.lb{font-size:11px;color:#a09890;margin-bottom:4px;display:block}
.inp{width:100%;background:#fff;border:1px solid rgba(200,190,180,.35);border-radius:10px;padding:10px 14px;font-size:13px;color:#3a3632;outline:none;margin-bottom:10px}
.inp:focus{border-color:#8b7355}
.inp.hint{font-size:12px;color:#a09890;font-style:italic}
.ta{width:100%;background:#fff;border:1px solid rgba(200,190,180,.35);border-radius:10px;padding:10px 14px;font-size:13px;color:#3a3632;outline:none;margin-bottom:10px;height:100px;resize:vertical;line-height:1.6}
.ta:focus{border-color:#8b7355}
.btn{background:#8b7355;border:none;color:#fff;padding:8px 18px;border-radius:10px;font-size:12px;cursor:pointer;margin-right:6px;margin-bottom:8px;letter-spacing:.3px}
.btn:active{background:#6b5a42}
.btn.o{background:transparent;border:1px solid rgba(200,190,180,.45);color:#8b7355}
.btn.d{background:#c45c5c}
.card{background:#fff;border:1px solid rgba(200,190,180,.25);border-radius:12px;margin-bottom:8px;overflow:hidden}
.cardh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer}
.cardh span{font-size:13px;font-weight:500;color:#3a3632}
.cardh .aw{font-size:10px;color:#a09890;transition:transform .3s}
.card.op .aw{transform:rotate(90deg)}
.cardb{display:none;padding:12px 14px;border-top:1px solid rgba(200,190,180,.12)}
.card.op .cardb{display:block}
.item{background:#fff;border:1px solid rgba(200,190,180,.25);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.item .il{flex:1}
.item .in{font-size:12px;font-weight:500;color:#3a3632}
.item .id{font-size:10px;color:#a09890;margin-top:2px}
.item .db{background:none;border:none;color:#c45c5c;cursor:pointer;font-size:14px;padding:0 4px;flex-shrink:0}
.tgl{position:relative;width:44px;height:24px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl .sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ddd;border-radius:24px;transition:.3s}
.tgl .sl:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tgl input:checked+.sl{background:#8b7355}
.tgl input:checked+.sl:before{transform:translateX(20px)}
.ri{background:#fff;border:1px solid rgba(200,190,180,.2);border-radius:10px;padding:12px 14px;margin-bottom:6px}
.rr{font-size:11px;color:#8b7355;font-weight:600;margin-bottom:3px}
.rt{font-size:13px;color:#3a3632;line-height:1.6}
.rn{font-style:italic;color:#6b6460}
.sv{background:#fff;border:1px solid rgba(200,190,180,.25);border-radius:12px;padding:14px;margin-bottom:8px}
.svt{font-size:13px;font-weight:600;color:#3a3632;margin-bottom:4px}
.svi{font-size:11px;color:#a09890;line-height:1.5}
.sve{color:#ccc5be;font-style:italic}
.sva{margin-top:8px;display:flex;gap:6px}
.sva button{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer}
#hamburger{width:36px;height:36px;background:rgba(255,252,249,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(200,190,180,.25);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0;flex-shrink:0}
#hamburger span{display:block;width:16px;height:1.5px;background:#8b7355;border-radius:1px}
#sb-ov{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:rgba(0,0,0,.3);backdrop-filter:blur(2px);z-index:40}
#sb-ov.on{display:block}
#sidebar{display:none;position:fixed;top:0;left:0;width:72%;max-width:300px;height:100vh;background:#fff;z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:4px 0 20px rgba(0,0,0,.1)}
.sb-hd{padding:50px 20px 16px;font-size:18px;font-weight:700;color:#3a3632;border-bottom:1px solid rgba(200,190,180,.15);display:flex;align-items:center;gap:10px;letter-spacing:.5px}
.sb-back{font-size:13px;color:#8b7355;cursor:pointer;font-weight:500}
.sb-sec{padding:18px 20px 6px;font-size:11px;color:#a09890;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sb-item{padding:15px 20px;font-size:14px;color:#3a3632;cursor:pointer;border-bottom:1px solid rgba(200,190,180,.06);display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.sb-item:active{background:rgba(200,190,180,.1)}
.sb-r{color:#a09890;font-size:12px}
.sb-tag{font-size:10px;color:#a09890;background:rgba(200,190,180,.15);padding:2px 8px;border-radius:6px}
.sb-val{font-size:12px;color:#8b7355;font-weight:500}
.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:rgba(58,54,50,.88);color:#fff;padding:8px 22px;border-radius:20px;font-size:12px;z-index:200;animation:ti .3s}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{color:#ccc5be;font-size:12px;text-align:center;padding:30px 0;font-style:italic}
/* ===== 真·夜间模式 ===== */
body.dark{background:#0d0d0f;color:#e8e8ea}
body.dark #home,
body.dark #mv,
body.dark #app{background:#0d0d0f}

/* 顶栏 */
body.dark .hht{color:#e8e8ea}
body.dark #hamburger{background:#1a1a1d;border-color:rgba(255,255,255,.08)}
body.dark #hamburger span{background:#9a9a9f}

/* 故事卡片 */
body.dark .sc{background:#1a1a1d;border-color:rgba(255,255,255,.06)}
body.dark .sc-t{color:#e8e8ea}
body.dark .sc-d{color:#8a8a90}
body.dark .sc-m{color:#5a5a60}
body.dark .sc-a button{background:#232327;border-color:rgba(255,255,255,.08);color:#b8b8bd}
body.dark .sc-a button:active{background:#2c2c30}
body.dark .sc-a button.del{color:#e88080;border-color:rgba(232,128,128,.25)}

/* 空状态 */
body.dark .hempty,body.dark .empty{color:#5a5a60}

/* 表单/弹窗背景 */
body.dark #nsf,body.dark #hapi{background:#1a1a1d;border-color:rgba(255,255,255,.06)}
body.dark .nsf-r input,
body.dark .nsf-r textarea,
body.dark .inp,
body.dark .ta,
body.dark select.inp{background:#232327;border-color:rgba(255,255,255,.08);color:#e8e8ea}
body.dark .inp:focus,body.dark .ta:focus{border-color:#6b9ce8}
body.dark .inp::placeholder,
body.dark .ta::placeholder,
body.dark .nsf-r input::placeholder,
body.dark .nsf-r textarea::placeholder{color:#5a5a60}
body.dark .nsf-b .ok{background:#6b9ce8;color:#0d0d0f}
body.dark .nsf-b .cc{border-color:rgba(255,255,255,.1);color:#8a8a90;background:transparent}

/* 标签/小字 */
body.dark .lb{color:#8a8a90}
body.dark .inp.hint{color:#6a6a6f}

/* 侧边栏 */
body.dark #sidebar{background:#141416;box-shadow:4px 0 30px rgba(0,0,0,.6)}
body.dark .sb-hd{color:#e8e8ea;border-color:rgba(255,255,255,.06)}
body.dark .sb-item{color:#e0e0e3;border-color:rgba(255,255,255,.04)}
body.dark .sb-item:active{background:rgba(255,255,255,.04)}
body.dark .sb-sec{color:#5a5a60}
body.dark .sb-tag{background:rgba(255,255,255,.06);color:#8a8a90}
body.dark .sb-back{color:#6b9ce8}
body.dark .sb-r{color:#5a5a60}
body.dark .sb-val{color:#6b9ce8}
body.dark #sb-ov{background:rgba(0,0,0,.55)}

/* 设置页 */
body.dark .mht{color:#e8e8ea}
body.dark .mhb{color:#6b9ce8}
body.dark .mtabs{border-color:rgba(255,255,255,.06)}
body.dark .mt{color:#6a6a6f}
body.dark .mt.on{color:#6b9ce8;border-bottom-color:#6b9ce8;font-weight:600}
body.dark .sech{color:#b8b8bd;border-color:rgba(255,255,255,.06)}

/* 卡片 / 列表项 */
body.dark .card{background:#1a1a1d;border-color:rgba(255,255,255,.06)}
body.dark .cardh span{color:#e8e8ea}
body.dark .cardh .aw{color:#6a6a6f}
body.dark .cardb{border-color:rgba(255,255,255,.05)}
body.dark .item{background:#1a1a1d;border-color:rgba(255,255,255,.06)}
body.dark .item .in{color:#e8e8ea}
body.dark .item .id{color:#7a7a80}
body.dark .item .db{color:#e88080}

/* 按钮 */
body.dark .btn{background:#6b9ce8;color:#0d0d0f}
body.dark .btn:active{background:#5a8cd8}
body.dark .btn.o{background:transparent;border:1px solid rgba(255,255,255,.12);color:#b8b8bd}
body.dark .btn.o:active{background:rgba(255,255,255,.04)}
body.dark .btn.d{background:#c45c5c;color:#fff}

/* 存档 / 回放 */
body.dark .sv{background:#1a1a1d;border-color:rgba(255,255,255,.06)}
body.dark .svt{color:#e8e8ea}
body.dark .svi{color:#8a8a90}
body.dark .sve{color:#5a5a60}
body.dark .ri{background:#1a1a1d;border-color:rgba(255,255,255,.06)}
body.dark .rr{color:#6b9ce8}
body.dark .rt{color:#e0e0e3}
body.dark .rn{color:#8a8a90}

/* 游戏画面 */
body.dark #screen{background:#0d0d0f}
body.dark #dlg{background:rgba(20,20,22,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-color:rgba(255,255,255,.08)}
body.dark #spk{color:#7eb3ec}
body.dark #dtx{color:#e8e8ea}
body.dark #dtx.nr{color:#9a9a9f;font-style:italic}
body.dark #cti{color:rgba(126,179,236,.45)}

/* 输入栏 */
body.dark #ibar{background:rgba(13,13,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-color:rgba(255,255,255,.06)}
body.dark #mi{background:#1f1f22;border-color:rgba(255,255,255,.08);color:#e8e8ea}
body.dark #mi::placeholder{color:#5a5a60}
body.dark #mi:focus{border-color:#6b9ce8}
body.dark #sbtn{background:#6b9ce8;color:#0d0d0f}
body.dark #sbtn:active{background:#5a8cd8}

/* 顶部按钮（设置/返回/原文） */
body.dark .gt{background:rgba(20,20,22,.85);border-color:rgba(255,255,255,.08);color:#b8b8bd;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
body.dark .gt:active{background:rgba(35,35,39,.95)}

/* loading / 提示 */
body.dark #ld{background:rgba(20,20,22,.92);border-color:rgba(255,255,255,.08);color:#e8e8ea}
body.dark #smsg{color:#5a5a60}

/* 通知 */
body.dark #ntf{background:rgba(28,28,32,.96);border-color:rgba(255,255,255,.08);box-shadow:0 4px 25px rgba(0,0,0,.5)}
body.dark #ntf .na{color:#7eb3ec}
body.dark #ntf .nc{color:#e8e8ea}
body.dark #ntf .nm{color:#7a7a80}

/* Toast */
body.dark .toast{background:rgba(232,232,234,.95);color:#0d0d0f}

/* 原文显示框 */
body.dark #rawx{background:rgba(20,20,22,.96);border-color:rgba(255,255,255,.08);color:#b8b8bd}

e="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label class="lb">最大输出Token</label><input class="inp" id="ha_mt" type="number" value="4096" style="margin-bottom:0"></div><div style="flex:1"><label class="lb">上下文轮数</label><input class="inp" id="ha_cl" type="number" value="6" min="1" max="50" style="margin-bottom:0"></div></div><div style="display:flex;gap:6px;margin-top:4px"><button class="btn" onclick="window.svHA()">保存预设</button><button class="btn o" onclick="window.tsHA()">测试连接</button></div> <div style="margin-top:16px;padding-top:14px;border-top:1px dashed rgba(200,190,180,.3)"> <label class="lb" style="font-weight:600;color:#6b6460">摘要专用 API（可选，省钱）</label> <p style="font-size:11px;color:#a09890;line-height:1.6;margin-bottom:8px">用便宜的小模型做摘要，主模型留给剧情。留空则和主模型共用</p> <label class="lb">摘要预设</label> <select class="inp" id="sum_sel" onchange="window.ldSumPreset()"><option value="">不启用 · 与主 API 共用</option></select> <label class="lb">API 地址</label><input class="inp" id="sum_u" placeholder="https://your-relay.com/v1"> <label class="lb">API Key</label><input class="inp" id="sum_k" type="password" placeholder="sk-..."> <label class="lb">模型名</label><input class="inp" id="sum_m" placeholder="gpt-4o-mini 或 gemini-2.5-flash"> <div style="display:flex;gap:6px;margin-top:4px"><button class="btn" onclick="window.svSum()">保存摘要API</button><button class="btn o" onclick="window.tsSum()">测试摘要API</button><button class="btn d" onclick="window.dlSum()">清空</button></div> </div> </div>

<script>
(function(){
var GK='vng_',sid=null;
function SK(){return 'vs_'+sid+'_'}
var DB=null,CACHE={};
function openDB(){return new Promise(function(ok,no){try{var timer=setTimeout(function(){no(new Error('timeout'))},3000);var r=indexedDB.open('vndb',1);r.onupgradeneeded=function(e){e.target.result.createObjectStore('kv')};r.onsuccess=function(e){clearTimeout(timer);DB=e.target.result;ok()};r.onerror=function(){clearTimeout(timer);no(r.error)};r.onblocked=function(){clearTimeout(timer);no(new Error('blocked'))}}catch(e){no(e)}})}
function idbSet(k,v){try{var tx=DB.transaction('kv','readwrite');tx.objectStore('kv').put(v,k)}catch(e){}}
function idbDel(k){try{var tx=DB.transaction('kv','readwrite');tx.objectStore('kv').delete(k)}catch(e){}}
function idbAll(){return new Promise(function(ok){var tx=DB.transaction('kv','readonly');var s=tx.objectStore('kv');var data={};var c=s.openCursor();c.onsuccess=function(e){var cur=e.target.result;if(cur){data[cur.key]=cur.value;cur.continue()}else{ok(data)}};c.onerror=function(){ok({})}})}
function GLD(k,d){var v=CACHE[GK+k];return v!==undefined?v:d}
function GSV(k,v){CACHE[GK+k]=v;idbSet(GK+k,v)}
function LD(k,d){var v=CACHE[SK()+k];return v!==undefined?v:d}
function SV(k,v){CACHE[SK()+k]=v;idbSet(SK()+k,v)}
var $=function(id){return document.getElementById(id)};window.$=$;
function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}
var api,stories,cards,sprites,spDesc,bgs,bgDesc,wb,wbId,mem,upr,hi,rp,svs,tc,tpls,userP,apiPresets;
var sc=[],si=0,dq=[],di=0,busy=0,acCh={},cBg='',lastRaw=''; 
var callMode=false,ntfTpl=null,ntfTimer=null;
function loadGlobal(){api=GLD('api',{url:'',model:'',key:'',temp:0.85,topP:1,maxTokens:4096,contextLen:6});stories=GLD('stories',[]);apiPresets=GLD('apiPresets',[])}
function loadStory(){cards=LD('cards',{});sprites=LD('sp',{});spDesc=LD('spd',{});bgs=LD('bg',{});bgDesc=LD('bgd',{});wb=LD('wb',[]);wbId=LD('wbid',1);mem=LD('mem',{shortLen:6,autoEnabled:true,autoInterval:5,auto:[],manual:[],sumTo:0});upr=LD('upr','');hi=LD('hi',[]);rp=LD('rp',[]);svs=LD('svs',[null,null,null,null,null]);tc=LD('tc',0);tpls=LD('tpls',{});userP=LD('userp',{name:'',gender:'',appearance:'',personality:'',background:'',relation:'',style:'',other:''})}

// HOME
function rdrHome(){var h='';if(!stories.length){h='<div class="hempty">还没有故事<br>点击右上角「新建故事」开始创作</div>'}else{for(var i=0;i<stories.length;i++){var s=stories[i];h+='<div class="sc" onclick="enterStory(\''+s.id+'\')"><div class="sc-t">'+s.title+'</div>'+(s.desc?'<div class="sc-d">'+s.desc+'</div>':'')+'<div class="sc-m">'+(s.lastPlayed?'上次：'+s.lastPlayed:'未开始')+'</div><div class="sc-a" onclick="event.stopPropagation()"><button onclick="enterStory(\''+s.id+'\')">进入</button><button class="del" onclick="delStory(\''+s.id+'\')">删除</button></div></div>'}}$('storyList').innerHTML=h}
window.showNsf=function(){$('nsf').style.display='block'};
window.hideNsf=function(){$('nsf').style.display='none';$('ns_t').value='';$('ns_d').value=''};
window.createStory=function(){var t=$('ns_t').value.trim();if(!t)return toast('请输入标题');var id=Date.now().toString(36);stories.push({id:id,title:t,desc:$('ns_d').value.trim(),created:new Date().toLocaleString('zh-CN'),lastPlayed:''});GSV('stories',stories);hideNsf();rdrHome();toast('已创建');enterStory(id)};
window.delStory=function(id){if(!confirm('删除这个故事？'))return;stories=stories.filter(function(s){return s.id!==id});GSV('stories',stories);var pfx='vs_'+id+'_';Object.keys(CACHE).forEach(function(k){if(k.indexOf(pfx)===0){delete CACHE[k];idbDel(k)}});rdrHome();toast('已删除')};
window.enterStory=function(id){sid=id;GSV('cur',id);for(var i=0;i<stories.length;i++)if(stories[i].id===id)stories[i].lastPlayed=new Date().toLocaleString('zh-CN');GSV('stories',stories);loadStory();$('home').style.display='none';$('gv').style.display='block';sc=[];si=0;dq=[];di=0;acCh={};cBg='';lastRaw='';callMode=false;$('chl').innerHTML='';$('dlg').style.display='none';$('rawb').style.display='none';$('rawx').style.display='none';$('bgl').style.backgroundImage='';var sm=$('smsg');if(sm)sm.style.display='block'};
window.goHome=function(){callMode=false;$('gv').style.display='none';$('mv').style.display='none';$('mv').classList.remove('open');$('home').style.display='flex';rdrHome()};
window.openSB=function(){$('sb-ov').classList.add('on');$('sidebar').style.display='block';$('sb-main').style.display='block';$('sb-set').style.display='none'};
window.closeSB=function(){$('sb-ov').classList.remove('on');$('sidebar').style.display='none'};
window.sbNew=function(){closeSB();setTimeout(function(){showNsf()},200)};
window.sbSet=function(){$('sb-main').style.display='none';$('sb-set').style.display='block';calcStorage();$('darkTgl').checked=document.body.classList.contains('dark')};
window.sbBack=function(){$('sb-set').style.display='none';$('sb-main').style.display='block'};
window.calcStorage=function(){try{var total=0;var keys=Object.keys(CACHE);for(var i=0;i<keys.length;i++){total+=JSON.stringify(CACHE[keys[i]]).length+keys[i].length}var kb=total/1024;var display=kb<1024?(kb.toFixed(1)+' KB'):((kb/1024).toFixed(2)+' MB');$('sb-stor-v').textContent=display}catch(e){$('sb-stor-v').textContent='无法计算'}};
window.expAllGlobal=function(){dl('all_stories_data.json',JSON.stringify(CACHE,null,2));closeSB();toast('已导出全部数据')};

function cleanKey(k){return (k||'').replace(/[\s\u200B-\u200D\uFEFF\u00A0]/g,'')} function cleanURL(u){u=(u||'').trim().replace(/\/+$/,'');if(!/\/v\d+$/.test(u)&&u.indexOf('/v1')===-1&&u.indexOf('/v2')===-1&&u.indexOf('/v3')===-1)u+='/v1';return u} async function callAPI(msgs){var url=cleanURL(api.url)+'/chat/completions';var key=cleanKey(api.key);var body={model:api.model,messages:msgs,max_tokens:api.maxTokens||4096,temperature:api.temp!=null?api.temp:0.85};if(api.topP!=null&&api.topP<1)body.top_p=api.topP;var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify(body)});if(!r.ok){var e=await r.text();console.error('[API ERROR]',r.status,e);throw new Error(r.status+': '+e.substring(0,200))}var d=await r.json();if(!d.choices||!d.choices[0])throw new Error('返回异常: '+JSON.stringify(d).substring(0,200));return d.choices[0].message.content}

// BUILD SYSTEM PROMPT
function buildSys(){var base='你是一个视觉小说的导演兼编剧。根据用户输入推进剧情，用特定格式控制画面。\n\n## 输出格式（严格遵守）\n\n指令行：\n[bg:场景名] — 切换背景\n[char:角色名,位置,表情] — 显示角色（left/center/right）\n[hide:角色名] — 隐藏角色\n[wait] — 等待点击\n[notify:应用名,内容] — 屏幕顶部弹通知，用户可点击打开（如[notify:微信,方亦楷：在干嘛]）\n\n内容行：\n角色名：对话内容\n[narr]旁白文字\n\n模板指令（展示手机界面等）：\n[tpl:模板名]\\n变量名=值\\n[/tpl]\n\n自由HTML：\n[html]HTML代码[/html]\n\n## 通知+模板联动\n当[notify:]和[tpl:]在同一个[wait]段内时，通知可点击直接打开模板界面。适合\"收到消息→点开查看\"的场景。\n\n## 来电模板使用说明\n来电模板会显示来电界面，用户需点击接听按钮。接听后，后续的对话文字会显示在通话界面内。通话结束时用户点挂断。\n\n## QQ聊天表情包\n消息中使用 [img:图片链接] 可发送表情包/图片。\n\n## 绝对禁止\n- 禁止使用列表中不存在的名称\n- 禁止自创名称\n\n## 写作规则\n- 用[wait]分割节奏\n- 对话自然，旁白有文学性\n- 根据情绪切换表情\n- 角色收到消息时先用[notify:]弹通知增强沉浸感\n- 角色离开当前场景时必须用[hide:角色名]隐藏立绘\n- 切换背景时重新用[char:]指定在场角色，未指定的会自动消失\n';

if(userP&&userP.name){var up='\n## 用户角色（'+userP.name+'）\n';if(userP.gender)up+='性别：'+userP.gender+'\n';if(userP.appearance)up+='外貌：'+userP.appearance+'\n';if(userP.personality)up+='性格：'+userP.personality+'\n';if(userP.background)up+='背景：'+userP.background+'\n';if(userP.relation)up+='与角色关系：'+userP.relation+'\n';if(userP.style)up+='说话风格：'+userP.style+'\n';if(userP.other)up+=userP.other+'\n';base+=up+'\n'}
if(upr)base+='\n## 用户要求\n'+upr+'\n';
var wbA='',wbT=[];for(var i=0;i<wb.length;i++){var w=wb[i];if(!w.enabled)continue;if(w.mode==='always')wbA+='\n### '+w.name+'\n'+w.content+'\n';else wbT.push(w)}
var rt=hi.slice(-4).map(function(m){return m.content}).join(' ');var wbTr='';for(var i=0;i<wbT.length;i++){var w=wbT[i];var kws=w.keywords.split(/[,，]/).map(function(k){return k.trim()}).filter(function(k){return k});for(var j=0;j<kws.length;j++)if(rt.indexOf(kws[j])!==-1){wbTr+='\n### '+w.name+'\n'+w.content+'\n';break}}
if(wbA||wbTr)base+='\n## 世界设定\n'+wbA+wbTr;
var ct='';for(var n in cards){var c=cards[n];ct+='\n### '+c.name+'\n';if(c.personality)ct+='性格：'+c.personality+'\n';if(c.appearance)ct+='外貌：'+c.appearance+'\n';if(c.background)ct+='背景：'+c.background+'\n';if(c.style)ct+='说话风格：'+c.style+'\n';if(c.opening)ct+='开场白：'+c.opening+'\n'}if(ct)base+='\n## 角色\n'+ct;
var at='\n\n## 可用素材\n\n';var hs=Object.keys(sprites).length,hb=Object.keys(bgs).length;
if(hs){at+='### 角色立绘\n';for(var n in sprites){at+='角色名：'+n+'\n  表情：';var ex=[];for(var e in sprites[n]){var d=spDesc[n]&&spDesc[n][e];ex.push(e+(d?' ('+d+')':''))}at+=ex.join('、')+'\n'}}
if(hb){at+='\n### 场景背景\n';for(var b in bgs){var d=bgDesc[b];at+='场景名：'+b+(d?' ('+d+')':'')+'\n'}}
if(hs||hb)base+=at;
var tplInfo='\n## 可用模板\n\n';var hasTpl=false;for(var n in BTPL){hasTpl=true;tplInfo+='模板名：'+n+'\n'+BTPL[n].vars+'\n\n'}for(var n in tpls){hasTpl=true;tplInfo+='模板名：'+n+'\n'+(tpls[n].vars||'')+'\n\n'}if(hasTpl)base+=tplInfo;
return base}

function buildMsgs(userMsg){var msgs=[{role:'system',content:buildSys()}];var mc='';if(mem.auto.length)mc+='## 剧情摘要\n'+mem.auto.join('\n\n')+'\n\n';if(mem.manual.length)mc+='## 重要信息\n'+mem.manual.join('\n')+'\n\n';if(mc)msgs.push({role:'system',content:mc});var cl=api.contextLen||6;var s=Math.max(0,hi.length-cl*2);msgs=msgs.concat(hi.slice(s));msgs.push({role:'user',content:userMsg});return msgs}

// ENGINE
function findBg(name){name=name.trim();if(bgs[name])return bgs[name];var ln=name.toLowerCase();for(var k in bgs){if(k.toLowerCase()===ln)return bgs[k];if(k.indexOf(name)!==-1||name.indexOf(k)!==-1)return bgs[k]}return null}
function findCh(name,expr){name=name.trim();expr=expr.trim();if(sprites[name]&&sprites[name][expr])return{n:name,u:sprites[name][expr]};var rn=null,ln=name.toLowerCase();for(var k in sprites){if(k.toLowerCase()===ln){rn=k;break}if(k.indexOf(name)!==-1||name.indexOf(k)!==-1){rn=k;break}}if(!rn)return null;if(sprites[rn][expr])return{n:rn,u:sprites[rn][expr]};var le=expr.toLowerCase();for(var e in sprites[rn]){if(e.toLowerCase()===le||e.indexOf(expr)!==-1||expr.indexOf(e)!==-1)return{n:rn,u:sprites[rn][e]}}var fk=Object.keys(sprites[rn]);if(fk.length)return{n:rn,u:sprites[rn][fk[0]]};return null}

function parse(txt){var lines=txt.split('\n'),res=[],cur={c:[],d:[]};var inTpl=false,tplName='',tplBody='',inHtml=false,htmBody='';for(var i=0;i<lines.length;i++){var l=lines[i];var lt=l.trim();if(!inTpl&&!inHtml&&lt==='')continue;var tm=lt.match(/^\[tpl:\s*(.+?)\s*\]$/);if(tm&&!inTpl&&!inHtml){inTpl=true;tplName=tm[1];tplBody='';continue}if(inTpl){if(lt==='[/tpl]'){var vars={};tplBody.split('\n').forEach(function(ln){var eq=ln.indexOf('=');if(eq>0)vars[ln.substring(0,eq).trim()]=ln.substring(eq+1).trim()});cur.c.push({t:'tpl',n:tplName,v:vars});inTpl=false;tplName='';tplBody='';continue}tplBody+=l+'\n';continue}if(lt==='[html]'&&!inHtml){inHtml=true;htmBody='';continue}if(inHtml){if(lt==='[/html]'){cur.c.push({t:'htm',h:htmBody});inHtml=false;htmBody='';continue}htmBody+=l+'\n';continue}if(lt==='[wait]'){if(cur.c.length||cur.d.length){res.push(cur);cur={c:[],d:[]}}continue}var m;if(m=lt.match(/^\[notify:\s*(.+?)\s*,\s*(.+?)\s*\]$/)){cur.c.push({t:'ntf',a:m[1],x:m[2]});continue}if(m=lt.match(/^\[bg:\s*(.+?)\s*\]$/)){cur.c.push({t:'bg',v:m[1]});continue}if(m=lt.match(/^\[char:\s*(.+?)\s*,\s*(.+?)\s*,\s*(.+?)\s*\]$/)){cur.c.push({t:'ch',n:m[1],p:m[2].toLowerCase(),e:m[3]});continue}if(m=lt.match(/^\[hide:\s*(.+?)\s*\]$/)){cur.c.push({t:'hi',n:m[1]});continue}if(m=lt.match(/^\[narr\]\s*(.+)$/)){cur.d.push({t:'n',x:m[1]});continue}if(m=lt.match(/^(.+?)[:：]\s*(.+)$/)){cur.d.push({t:'d',s:m[1].trim(),x:m[2].trim()});continue}if(lt)cur.d.push({t:'n',x:lt})}if(cur.c.length||cur.d.length)res.push(cur);return res}

function renderSc(s){var ntfCmd=null,tplHtml=null;for(var i=0;i<s.c.length;i++){if(s.c[i].t==='ntf')ntfCmd=s.c[i];if(s.c[i].t==='tpl'){var h=renderTplFromVars(s.c[i].n,s.c[i].v);if(h)tplHtml=h}}var sceneChars={};var hasBgChange=false;for(var i=0;i<s.c.length;i++){if(s.c[i].t==='ch')sceneChars[s.c[i].n]=1;if(s.c[i].t==='bg')hasBgChange=true}var hasCharCmd=Object.keys(sceneChars).length>0;var toHide=[];if(hasCharCmd){for(var k in acCh){var keep=false;for(var sn in sceneChars){if(k===sn||k.indexOf(sn)!==-1||sn.indexOf(k)!==-1){keep=true;break}}if(!keep)toHide.push(k)}}else if(hasBgChange){for(var k in acCh)toHide.push(k)}toHide.forEach(function(k){hideCh(k)});for(var i=0;i<s.c.length;i++){var c=s.c[i];if(c.t==='bg'){var bu=findBg(c.v);if(bu){$('bgl').style.backgroundImage='url('+bu+')';cBg=c.v}}if(c.t==='ch'){var f=findCh(c.n,c.e);if(f)showCh(f.n,c.p,f.u)}if(c.t==='hi')hideCh(c.n);if(c.t==='ntf'){showNotify(c.a,c.x,ntfCmd&&tplHtml?tplHtml:null)}if(c.t==='tpl'&&!ntfCmd&&tplHtml){showTpl(tplHtml)}if(c.t==='htm')showTpl(c.h)}dq=s.d;di=0;if(dq.length>0&&!callMode)showDlg(dq[0]);else if(dq.length>0&&callMode){var ca=document.getElementById('call-act');if(ca&&ca.style.display!=='none')showDlg(dq[0])}}
